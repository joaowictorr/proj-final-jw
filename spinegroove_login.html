<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Spin & Groove - Vinyl Shop</title>
    <style>
        :root {
            --vinyl-black: #121212;
            --gold: #d4af37;
            --off-white: #f5f5f5;
            --gray: #2c2c2c;
            --accent: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--vinyl-black);
            background-image: radial-gradient(circle at center, #1e1e1e 0%, #0a0a0a 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--off-white);
        }

        .login-card {
            background: rgba(44, 44, 44, 0.8);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 3rem;
            animation: spin 6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .brand-name span {
            color: var(--gold);
        }

        h2 {
            font-weight: 300;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #888;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--gold);
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--gold);
        } 

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--gold);
            color: var(--vinyl-black);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
        }

         .btn-login:hover {
            background-color: #f1c40f;
            transform: translateY(-1px);
        } 

        .footer-links {
            margin-top: 25px;
            font-size: 0.8rem;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--gold);
        }

        .divider {
            margin: 15px 0;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon">💿</div>
            <div class="brand-name">Spin <span>& Groove</span></div>
        </div>
        
        <h2>Acesse sua vitrine</h2>

        <form action="#">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required> 
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required> 
            </div>

            <button type="submit" class="btn-login">Sincronizar Agulha</button>
        </form>

        <div class="footer-links"><p><a href="#">Esqueceu a senha?</a></p>
            <div class="divider">─────</div>
            <p>Ainda não faz parte do clube? <a href="#"><strong>Cadastre-se</strong></a></p>
        </div>
    </div>

</body>
</html>
